name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/sample-app
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull existing image (NO rebuild)
        run: |
          docker pull $IMAGE_NAME:$IMAGE_TAG

      - name: Run PROD container
        run: |
          docker run -d --name sample-app-prod -p 8002:8000 --env-file .env.prod $IMAGE_NAME:$IMAGE_TAG

      - name: Wait for startup
        run: sleep 10

      - name: Health check PROD
        run: |
          curl -f http://localhost:8002/health

      - name: Cleanup old container
        if: always()
        run: |
          docker stop sample-app-prod || true
          docker rm sample-app-prod || true