name: CI-CD Dev Deployment

on:
  push:
    branches:
      - main

jobs:
  build-test-push-deploy-dev:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/sample-app
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Create deploy env file
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME:$IMAGE_TAG" > .deploy-dev.env

      - name: Deploy to Dev
        run: |
          docker compose -f docker-compose.dev.yml --env-file .deploy-dev.env down || true
          docker compose -f docker-compose.dev.yml --env-file .deploy-dev.env up -d

      - name: Wait for startup
        run: sleep 10

      - name: Health check on Dev
        run: |
          curl -f http://localhost:8001/health