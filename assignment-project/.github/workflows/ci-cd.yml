name: CI-CD Dev Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Build Docker image
        run: |
          docker build -t sample-app:${{ github.sha }} .

      - name: Run container for health check
        run: |
          docker run -d --name sample-app-test -p 8000:8000 --env-file .env.dev sample-app:${{ github.sha }}

      - name: Wait for app startup
        run: |
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8000/health

      - name: Stop test container
        if: always()
        run: |
          docker stop sample-app-test || true
          docker rm sample-app-test || true